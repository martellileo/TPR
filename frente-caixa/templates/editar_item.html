<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Item - Frente Caixa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 600px; margin: 40px auto;">
        <h1 class="novo-item">✏️ Editar Item #{{ item.idItem }}</h1>
        
        <form method="POST" action="/item/{{ item.idItem }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" name="descricao" value="{{ item.descricao }}" required>
            </div>
            
            <div class="form-group">
                <label for="tipo">Tipo/Categoria</label>
                <input type="text" id="tipo" name="tipo" value="{{ item.tipo or '' }}" required>
            </div>
            
            <div class="form-group">
                <label for="qtde">Quantidade</label>
                <input type="number" id="qtde" name="qtde" value="{{ item.qtde }}" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="precoCusto">Preço de Custo</label>
                <input type="number" id="precoCusto" name="precoCusto" value="{{ item.precoCusto }}" step="0.01" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="precoVenda">Preço de Venda</label>
                <input type="number" id="precoVenda" name="precoVenda" value="{{ item.precoVenda }}" step="0.01" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="imagem">Imagem (PNG, JPG)</label>
                {% if item.imagem %}
                    <div style="margin-bottom: 10px;">
                        <img src="data:image/jpeg;base64,{{ item.imagem|b64encode }}" alt="{{ item.descricao }}" style="max-width: 200px; max-height: 200px; border-radius: 4px;">
                        <p style="font-size: 12px; color: #666;">Imagem atual</p>
                    </div>
                {% endif %}
                <input type="file" id="imagem" name="imagem" accept="image/png,image/jpeg,.png,.jpg,.jpeg">
                <p style="font-size: 12px; color: #666;">Deixe em branco para manter a imagem atual</p>
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn-save">💾 Salvar Alterações</button>
                <a href="/admin/listar_itens">
                    <button type="button" class="btn-cancel">❌ Cancelar</button>
                </a>
            </div>
        </form>
    </div>
</body>
</html>
