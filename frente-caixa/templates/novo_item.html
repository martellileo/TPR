<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Item - Frente Caixa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 600px; margin: 40px auto;">
        <h1 class="novo-item">➕ Novo Item</h1>
        
        <form method="POST" action="/item" enctype="multipart/form-data">
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" name="descricao" placeholder="Ex: Produto XYZ" required>
            </div>
            
            <div class="form-group">
                <label for="tipo">Tipo/Categoria</label>
                <input type="text" id="tipo" name="tipo" placeholder="Ex: Bebida, Carne, Frios" required>
            </div>
            
            <div class="form-group">
                <label for="qtde">Quantidade</label>
                <input type="number" id="qtde" name="qtde" placeholder="0" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="precoCusto">Preço de Custo</label>
                <input type="number" id="precoCusto" name="precoCusto" placeholder="0.00" step="0.01" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="precoVenda">Preço de Venda</label>
                <input type="number" id="precoVenda" name="precoVenda" placeholder="0.00" step="0.01" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="imagem">Imagem (PNG, JPG)</label>
                <input type="file" id="imagem" name="imagem" accept="image/png,image/jpeg,.png,.jpg,.jpeg">
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn-save">💾 Salvar</button>
                <a href="/admin">
                    <button type="button" class="btn-cancel">❌ Cancelar</button>
                </a>
            </div>
        </form>
    </div>
</body>
</html>
