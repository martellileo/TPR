<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabuada</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid #000;
            padding: 8px 15px;
        }

        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h1>Tabuada do {{ numero }}</h1>
    <form action="/respostas" method="post">
        <input type="hidden" name="numero" value="{{ numero }}">
        <table>
            <tr>
                <th>Operação</th>
                <th>Resultado</th>
            </tr>

                {% for i in range(1, 11) %}
                <tr>
                <td>{{ numero }} x {{ i }}</td>
                    <td><input type="text" name="entrada{{ i }}"></td>
                </tr>
                {% endfor %}

          </table>
        <br>
        <button name="bt01" type="submit">Responder Tabuada</button>
    </form>
    <br>
    <a href="/">Voltar</a>
</body>
</html>
