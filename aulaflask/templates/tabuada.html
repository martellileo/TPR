<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabuada</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid #000;
            padding: 8px 15px;
        }

        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h1>Tabuada do {{ numero }}</h1>

    <table>
        <tr>
            <th>Operação</th>
            <th>Resultado</th>
        </tr>

        {% for i in range(1, 11) %}
        <tr>
            <td>{{ numero }} x {{ i }}</td>
            <td>{{ numero * i }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/">Voltar</a>
</body>
</html>
