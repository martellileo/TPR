<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Cadastros</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h2>Cadastros Realizados</h2>
    
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Endereço</th>
                <th>Cidade</th>
                <th>UF</th>
                <th>CEP</th>
            </tr>
        </thead>
        <tbody>
            {% for usuario in usuarios %}
            <tr>
                <td>{{ usuario.nome }}</td>
                <td>{{ usuario.endereco }}</td>
                <td>{{ usuario.cidade }}</td>
                <td>{{ usuario.uf }}</td>
                <td>{{ usuario.cep }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">Nenhum cadastro foi realizado ainda.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/">Voltar para o Cadastro</a>
</body>
</html>
