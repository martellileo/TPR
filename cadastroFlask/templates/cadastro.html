<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; }
        .form-container { max-width: 400px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        input { padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .btn-submit:hover { background-color: #218838; }
        .btn-lista { padding: 10px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; display: block; text-align: center; }
        .btn-lista:hover { background-color: #0056b3; }
        .sucesso { background-color: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Novo Cadastro</h2>

        {% if mensagem %}
            <div class="sucesso">
                {{ mensagem }}
            </div>
        {% endif %}

        <form action="/" method="POST">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Leo" required>
            </div>
            
            <div class="form-group">
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>

            <div class="form-group">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" placeholder="Ex.: Presidente Epitácio" required>
            </div>

            <div class="form-group">
                <label for="uf">UF:</label>
                <input type="text" id="uf" name="uf" maxlength="2" placeholder="Ex.: SP" required>
            </div>

            <div class="form-group">
                <label for="cep">CEP:</label>
                <input type="text" id="cep" name="cep" placeholder="19470-000" maxlength="9" required>
            </div>

            <button type="submit" class="btn-submit">Salvar Cadastro</button>
        </form>
        
        <a href="/lista" class="btn-lista">Ir para a Lista de Cadastros</a>
    </div>

    <script>
        document.getElementById('cep').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, ''); 
            if (x.length > 5) {
                e.target.value = x.replace(/^(\d{5})(\d)/, '$1-$2');
            } else {
                e.target.value = x;
            }
        });
    </script>
</body>
</html>
